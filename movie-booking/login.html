<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CinemaDB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0A0A0A 0%, #180000 40%, #0A0A0A 100%);
      position: relative;
      overflow: hidden;
    }
    
    .auth-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 15% 60%, rgba(229,9,20,0.18) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 15%, rgba(229,9,20,0.07) 0%, transparent 45%);
    }

    .auth-box {
      position: relative;
      z-index: 2;
      background: rgba(31, 31, 31, 0.95);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 50px 40px;
      max-width: 420px;
      width: 100%;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }

    .auth-box.signup-mode {
      max-width: 860px;
      padding: 18px 24px 16px;
      max-height: 80vh;
      overflow: hidden;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-box.signup-mode .auth-header {
      margin-bottom: 12px;
    }

    .auth-box.signup-mode .auth-logo {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    .auth-box.signup-mode .auth-title {
      font-size: 1.35rem;
      margin-bottom: 4px;
    }

    .auth-box.signup-mode .auth-subtitle {
      font-size: 0.78rem;
    }

    .auth-logo {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .auth-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .signup-layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
    }

    .signup-layout .form-group {
      margin-bottom: 0;
    }

    .signup-layout .form-group.full {
      grid-column: 1 / -1;
    }

    .auth-box.signup-mode .form-group label {
      margin-bottom: 4px;
      font-size: 0.75rem;
    }

    .auth-box.signup-mode .form-group input,
    .auth-box.signup-mode .form-group select {
      padding: 9px 11px;
      font-size: 0.82rem;
    }

    .auth-box.signup-mode .role-selector {
      margin-bottom: 8px;
    }

    .auth-box.signup-mode .btn-auth {
      margin-top: 4px;
      padding: 10px 18px;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(229, 9, 20, 0.05);
      box-shadow: 0 0 0 2px rgba(229, 9, 20, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .role-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .role-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .role-option:hover {
      border-color: var(--primary);
    }

    .role-option.selected {
      border-color: var(--primary);
      background: rgba(229, 9, 20, 0.1);
      color: var(--primary);
    }

    .btn-auth {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #B00710 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
      box-shadow: 0 6px 20px rgba(229, 9, 20, 0.3);
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
    }

    .btn-auth:active {
      transform: translateY(0);
    }

    .auth-divider {
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .auth-box.signup-mode .auth-divider {
      margin: 10px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      display: inline-block;
      width: 40%;
      height: 1px;
      background: var(--border-color);
      vertical-align: middle;
    }

    .auth-divider::before {
      margin-right: 10px;
    }

    .auth-divider::after {
      margin-left: 10px;
    }

    .auth-toggle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-box.signup-mode .auth-toggle {
      margin-bottom: 6px;
      font-size: 0.85rem;
    }

    .auth-toggle a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-toggle a:hover {
      color: #fff;
    }

    .alert-auth {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid var(--danger);
      background: rgba(229, 9, 20, 0.1);
      color: #ff6b6b;
      font-size: 0.85rem;
    }

    .alert-auth.show {
      display: block;
    }

    .demo-accounts {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-box.signup-mode .demo-accounts {
      margin-top: 10px;
      padding-top: 10px;
      font-size: 0.75rem;
    }

    .auth-box.signup-mode .demo-accounts strong {
      margin-bottom: 6px;
      font-size: 0.78rem;
    }

    .demo-accounts strong {
      color: var(--text-secondary);
      display: block;
      margin-bottom: 8px;
    }

    .demo-item {
      padding: 6px 0;
      color: var(--text-muted);
    }

    .demo-item .role-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-left: 6px;
      font-weight: 600;
    }

    .demo-item .admin {
      background: rgba(229, 9, 20, 0.2);
      color: var(--primary);
    }

    .demo-item .user {
      background: rgba(0, 148, 212, 0.2);
      color: var(--info);
    }

    @media (max-width: 991.98px) {
      .auth-box.signup-mode {
        max-width: 92vw;
        max-height: 80vh;
      }
    }

    @media (max-width: 767.98px) {
      .auth-box,
      .auth-box.signup-mode {
        max-width: 94vw;
        padding: 20px 16px 14px;
        max-height: 80vh;
      }

      .signup-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Loading state */
    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="auth-container">

  <!-- LOGIN FORM -->
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-film"></i></div>
      <h1 class="auth-title">CinemaDB</h1>
      <p class="auth-subtitle">Movie Ticket Booking System</p>
    </div>

    <div id="alertBox" class="alert-auth"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-auth" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
      <div class="signup-layout">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="signupPhone" placeholder="e.g. 0300-1234567" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password (min. 6 chars)" minlength="6" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
        </div>
        <div class="form-group full">
          <label>Account Type</label>
          <select id="signupRole" required>
            <option value="User">User</option>
            <option value="Administrator">Administrator</option>
          </select>
        </div>
        <div class="form-group full" style="margin-bottom:0;">
          <button type="submit" class="btn-auth" id="signupBtn">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
        </div>
      </div>
    </form>

    <div class="auth-divider" id="divider">OR</div>

    <div class="auth-toggle">
      Don't have an account? <a onclick="toggleForms()">Sign Up</a>
    </div>

    <div class="demo-accounts">
      <strong><i class="fas fa-lightbulb"></i> Demo Accounts:</strong>
      <div class="demo-item">
        admin@cinema.pk / admin123
        <span class="role-badge admin">ADMIN</span>
      </div>
      <div class="demo-item">
        user@cinema.pk / user123
        <span class="role-badge user">USER</span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Initialize demo users in localStorage
  function initDemoUsers() {
    const users = JSON.parse(localStorage.getItem('cdb_users') || '[]');
    
    const demoUsers = [
      {
        id: 1,
        email: 'admin@cinema.pk',
        password: 'admin123',
        name: 'Admin User',
        phone: '0300-0000000',
        role: 'Administrator',
        createdAt: new Date().toISOString()
      },
      {
        id: 2,
        email: 'user@cinema.pk',
        password: 'user123',
        name: 'Demo User',
        phone: '0300-1111111',
        role: 'User',
        createdAt: new Date().toISOString()
      }
    ];

    if (users.length === 0) {
      localStorage.setItem('cdb_users', JSON.stringify(demoUsers));
    }
  }

  // Check if already logged in
  function checkAuth() {
    const currentUser = JSON.parse(localStorage.getItem('cdb_currentUser'));
    if (currentUser) {
      window.location.href = 'index.html';
    }
  }

  // Toggle between login and signup forms
  function toggleForms() {
    const authBox = document.querySelector('.auth-box');
    document.getElementById('loginForm').classList.toggle('active');
    document.getElementById('signupForm').classList.toggle('active');
    authBox?.classList.toggle('signup-mode', document.getElementById('signupForm').classList.contains('active'));
    document.getElementById('divider').textContent = 
      document.getElementById('loginForm').classList.contains('active') ? 'OR' : 'OR';
    
    const toggle = document.querySelector('.auth-toggle a');
    if (document.getElementById('loginForm').classList.contains('active')) {
      toggle.textContent = 'Sign Up';
    } else {
      toggle.textContent = 'Sign In';
    }
    
    clearAlert();
  }

  // Select role for signup
  function selectRole(role, element) {
    document.querySelectorAll('.role-option').forEach(el => {
      el.classList.remove('selected');
    });
    element.classList.add('selected');
    document.getElementById('signupRole').value = role;
  }

  // Show alert message
  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.classList.add('show');
    box.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--success)';
    box.style.background = type === 'error' ? 'rgba(229, 9, 20, 0.1)' : 'rgba(70, 211, 105, 0.1)';
    box.style.color = type === 'error' ? '#ff6b6b' : '#4ecca3';
  }

  function clearAlert() {
    const box = document.getElementById('alertBox');
    box.classList.remove('show');
  }

  // Handle login
  function handleLogin(event) {
    event.preventDefault();
    clearAlert();

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const btn = document.getElementById('loginBtn');

    if (!email || !password) {
      showAlert('Please fill in all fields');
      return;
    }

    const users = JSON.parse(localStorage.getItem('cdb_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      showAlert('Invalid email or password');
      return;
    }

    // Store current user session
    const sessionUser = {
      id: user.id,
      email: user.email,
      name: user.name,
      phone: user.phone,
      role: user.role,
      loginTime: new Date().toISOString()
    };

    localStorage.setItem('cdb_currentUser', JSON.stringify(sessionUser));
    
    // Redirect to home
    window.location.href = 'index.html';
  }

  // Handle signup
  function handleSignup(event) {
    event.preventDefault();
    clearAlert();

    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    const role = document.getElementById('signupRole').value;
    const btn = document.getElementById('signupBtn');

    if (!name || !email || !phone || !password || !confirm || !role) {
      showAlert('Please fill in all fields');
      return;
    }

    if (password !== confirm) {
      showAlert('Passwords do not match');
      return;
    }

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters');
      return;
    }

    // Check if email already exists
    const users = JSON.parse(localStorage.getItem('cdb_users') || '[]');
    if (users.some(u => u.email === email)) {
      showAlert('Email already registered');
      return;
    }

    // Create new user
    const newUser = {
      id: users.length ? Math.max(...users.map(u => u.id)) + 1 : 1,
      email: email,
      password: password,
      name: name,
      phone: phone,
      role: role,
      createdAt: new Date().toISOString()
    };

    users.push(newUser);
    localStorage.setItem('cdb_users', JSON.stringify(users));

    showAlert('Account created successfully! Please log in.', 'success');
    
    setTimeout(() => {
      document.getElementById('signupForm').classList.remove('active');
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = '';
      document.querySelector('.auth-toggle a').textContent = 'Sign Up';
    }, 1500);
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    initDemoUsers();
    checkAuth();
  });
</script>
</body>
</html>
